# THIS FILE HAS BEEN GENERATED BY THE COMMAND `goreleaser:ci`; DO NOT EDIT;
#
# Releaser workflow setup
# https://goreleaser.com/ci/actions/
#
name: release

# run only on tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed to write releases
  packages: write # needed for ghcr access

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # this is important, otherwise it won't checkout the full tree (i.e. no previous tags)
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - uses: docker/setup-qemu-action@v4              # emulation for arm64 builds
      - uses: docker/setup-buildx-action@v4            # buildx builder (used by goreleaser)
      - uses: docker/login-action@v4                   # login to ghcr
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v7          # run goreleaser
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

